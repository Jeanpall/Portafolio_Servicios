<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="24" fill="#0a1e46"/>
  <!-- Large circuit H -->
  <g stroke="#2563a8" stroke-width="6" stroke-linecap="round">
    <line x1="80" y1="60" x2="80" y2="340"/>
    <line x1="80" y1="200" x2="200" y2="200"/>
    <line x1="200" y1="60" x2="200" y2="340"/>
  </g>
  <g>
    <circle cx="80" cy="60" r="14" fill="#3EBED5" filter="url(#glow)"/>
    <circle cx="80" cy="200" r="14" fill="#3EBED5" filter="url(#glow)"/>
    <circle cx="80" cy="340" r="14" fill="#3EBED5" filter="url(#glow)"/>
    <circle cx="200" cy="60" r="14" fill="#3EBED5" filter="url(#glow)"/>
    <circle cx="200" cy="200" r="14" fill="#3EBED5" filter="url(#glow)"/>
    <circle cx="200" cy="340" r="14" fill="#3EBED5" filter="url(#glow)"/>
  </g>
  <text x="230" y="230" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="4">HELIX</text>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
